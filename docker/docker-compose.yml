services:
  trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../outputs:/workspace/outputs
      - ~/.cache/huggingface:/root/.cache/huggingface
    shm_size: 4gb
    command: ["python", "scripts/run_train.py"]
